{{ template "header" . }}
{{ template "navbar" . }}

<main class="flex-grow flex items-center justify-center py-20 px-6">
    <div class="max-w-md w-full bg-white border border-[#E5E0D8] p-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-serif-luxury tracking-widest uppercase mb-2">Register</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Bergabunglah dengan dunia keanggunan</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div>
                <label class="block text-[9px] uppercase tracking-[0.2em] font-medium text-gray-500 mb-2">Nama Lengkap</label>
                <input type="text" id="username" required class="w-full border border-[#E5E0D8] px-4 py-3 text-xs bg-[#FAF9F6] focus:outline-none focus:border-black transition-colors">
            </div>

            <div>
                <label class="block text-[9px] uppercase tracking-[0.2em] font-medium text-gray-500 mb-2">Alamat Email</label>
                <input type="email" id="email" required class="w-full border border-[#E5E0D8] px-4 py-3 text-xs bg-[#FAF9F6] focus:outline-none focus:border-black transition-colors">
            </div>

            <div>
                <label class="block text-[9px] uppercase tracking-[0.2em] font-medium text-gray-500 mb-2">Kata Sandi (Min. 6 Karakter)</label>
                <input type="password" id="password" required class="w-full border border-[#E5E0D8] px-4 py-3 text-xs bg-[#FAF9F6] focus:outline-none focus:border-black transition-colors">
            </div>

            <button type="submit" class="w-full bg-[#1C1C1C] text-white text-[10px] uppercase tracking-[0.25em] font-medium py-4 hover:bg-gray-800 transition-colors">
                Daftar Sekarang
            </button>
        </form>

        <div id="errorMsg" class="hidden mt-4 text-center text-[10px] uppercase tracking-wider p-3 bg-red-100 text-red-800 border border-red-200"></div>
        <div id="successMsg" class="hidden mt-4 text-center text-[10px] uppercase tracking-wider p-3 bg-green-100 text-green-800 border border-green-200"></div>

        <div class="text-center mt-6 text-[10px] uppercase tracking-widest text-gray-500">
            Sudah terdaftar? <a href="/login" class="text-black font-semibold hover:underline">Masuk Di Sini</a>
        </div>
    </div>
</main>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        errorMsg.classList.add('hidden');
        successMsg.classList.add('hidden');

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const result = await response.json();

            if (response.ok) {
                successMsg.innerText = "Registrasi sukses! Mengalihkan ke halaman masuk...";
                successMsg.classList.remove('hidden');
                setTimeout(() => window.location.href = "/login", 2000);
            } else {
                errorMsg.innerText = result.message || "Gagal mendaftar.";
                errorMsg.classList.remove('hidden');
            }
        } catch (err) {
            errorMsg.innerText = "Gagal menghubungi server.";
            errorMsg.classList.remove('hidden');
        }
    });
</script>

{{ template "footer" . }}
