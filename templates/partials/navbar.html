{{ define "navbar" }}
<header class="border-b border-[#E5E0D8] bg-[#FAF9F6]/95 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <!-- Logo Butik -->
        <a href="/" class="text-2xl font-serif-luxury tracking-[0.25em] uppercase hover:opacity-80 transition-opacity">
            Maison
        </a>

        <!-- Navigasi Menu Tengah -->
        <nav class="hidden md:flex space-x-10 text-[10px] uppercase tracking-[0.2em] font-medium text-gray-600">
            <a href="/" class="hover:text-black transition-colors">Koleksi</a>
            <a href="/#catalog" class="hover:text-black transition-colors">Belanja</a>
            <a href="#" class="hover:text-black transition-colors">Filosofi</a>
        </nav>

        <!-- Navigasi Menu Kanan -->
        <div class="flex items-center space-x-6 text-[10px] uppercase tracking-[0.15em] font-medium">
            {{ if .isLoggedIn }}
                {{ if .isAdmin }}
                <a href="/admin/dashboard" class="hover:text-gray-500 transition-colors">Dashboard</a>
                {{ end }}
                <a href="/cart" class="hover:text-gray-500 transition-colors">Tas Belanja</a>
                <a href="/orders" class="hover:text-gray-500 transition-colors">Pesanan</a>
                <a href="/logout" class="text-red-700 hover:text-red-500 transition-colors">Keluar</a>
            {{ else }}
                <a href="/login" class="hover:text-gray-500 transition-colors">Masuk</a>
                <a href="/register" class="bg-[#1C1C1C] text-white px-4 py-2 hover:bg-gray-800 transition-colors">Daftar</a>
            {{ end }}
        </div>
    </div>
</header>
{{ end }}
